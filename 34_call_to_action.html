<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2>Pequenas mudanças, grandes impactos</h2>
        </div>
        <div class="content-area">
            <div class="action-item">
                <span class="prompt-icon">></span>
                <span>Comece adotando o padrão nos seus <span class="highlight">próprios commits</span> hoje.</span>
            </div>
            <div class="action-item">
                <span class="prompt-icon">></span>
                <span>Sugira <span class="highlight">templates de PR</span> simples para a sua equipe.</span>
            </div>
            <div class="action-item">
                <span class="prompt-icon">></span>
                <span>A padronização é contagiosa: <span class="highlight">bons exemplos</span> puxam o time.</span>
            </div>
        </div>
        <div class="terminal-footer">
            <span>$ git commit -m "chore: start cultural change"</span>
        </div>
    </div>
</body>
</html>
