<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container slide-commit-exemplos">
        <div class="header">
            <h2>Exemplos de commits convencionais</h2>
        </div>
        <div class="commit-exemplos-list">
            <div class="commit-exemplo-card">
                <p class="commit-exemplo-label">Mensagem de commit sem corpo</p>
                <div class="commit-exemplo-line">
                    <span class="commit-exemplo-type">docs:</span>
                    <span class="commit-exemplo-desc">ortografia correta de CHANGELOG</span>
                </div>
            </div>
            <div class="commit-exemplo-card">
                <p class="commit-exemplo-label">Mensagem de commit com escopo</p>
                <div class="commit-exemplo-line">
                    <span class="commit-exemplo-type">feat(lang):</span>
                    <span class="commit-exemplo-desc">adiciona tradução para português brasileiro</span>
                </div>
            </div>
            <div class="commit-exemplo-card">
                <p class="commit-exemplo-label">Exemplo de quebra de compatibilidade</p>
                <div class="commit-exemplo-line">
                    <span class="commit-exemplo-type commit-exemplo-type--breaking">feat!:</span>
                    <span class="commit-exemplo-desc">envia email para o cliente quando o produto é enviado</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
