<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header header--bp-anchor">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">1</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">Comunicação clara nos commits</span>
            </p>
            <h2>Rebase interativo</h2>
        </div>
        <div class="content-grid content-grid--cleanup">
            <div class="text-section">
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span><span class="highlight">Rebase interativo</span> (<code class="inline-git">git rebase -i</code>) reescreve o histórico <span class="highlight">local</span>: você pode juntar commits (<span class="highlight">squash</span> / fixup), reordená-los ou editar mensagens antes de abrir o PR.</span>
                </div>
            </div>
            <div class="code-terminal code-terminal--cleanup">
                <div class="comment"># Rebase interativo (ex.: últimos 3 commits)</div>
                <div><span class="cmd">git</span> rebase -i HEAD~3</div>
            </div>
        </div>
    </div>
</body>
</html>
