<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container slide-merge">
        <div class="header header--bp-anchor">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">3</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">Estratégias de merge na sua branch <span class="highlight">main</span></span>
            </p>
            <h2>Como integrar na branch principal?</h2>
        </div>
        <div class="merge-intro-body merge-intro-body--split">
            <div class="text-section">
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span>Ao aceitar um PR, a plataforma costuma oferecer <span class="highlight">mais de uma forma</span> de levar o trabalho para a <span class="highlight">main</span> — cada opção desenha o <span class="highlight">git log --graph</span> de um jeito diferente.</span>
                </div>
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span>Alinhe <span class="highlight">regra + convenção</span> no time.</span>
                </div>
            </div>
            <figure class="merge-intro-illustration" role="img" aria-label="Interface com opções de merge ao aceitar um pull request">
                <img src="merge-pr.png" alt="Captura da interface de merge do pull request na plataforma, mostrando as opções disponíveis">
            </figure>
        </div>
    </div>
</body>
</html>
