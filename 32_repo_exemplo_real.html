<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container slide-merge">
        <div class="header">
            <h2>Repositório real de exemplo</h2>
            <div class="subtitle">Momento ao vivo: <span class="highlight">este repositório no GitHub</span></div>
        </div>
        <div class="merge-intro-body merge-intro-body--split">
            <div class="text-section">
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span>Tudo que vimos — <span class="highlight">commits</span>, <span class="highlight">PRs</span> e <span class="highlight">estratégias de merge</span> — aparece no dia a dia de um projeto típico.</span>
                </div>
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span>Referência na web: <span class="highlight">github.com/duda-prc/iwd-2026-eduarda-campos</span></span>
                </div>
            </div>
            <figure class="merge-intro-illustration" role="img" aria-label="Captura da página do repositório iwd-2026-eduarda-campos no GitHub">
                <img src="repo-example.png" alt="GitHub: repositório público duda-prc/iwd-2026-eduarda-campos, branch main, lista de arquivos e último commit">
            </figure>
        </div>
    </div>
</body>
</html>
