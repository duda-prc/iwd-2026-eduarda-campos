<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container slide-comunicacao-cc">
        <div class="header header--bp-anchor">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">1</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">Comunicação clara nos commits</span>
            </p>
            <h2>Comunicação clara nos commits</h2>
        </div>
        <div class="merge-intro-body merge-intro-body--split">
            <div class="text-section">
                <div class="point">
                    <span class="prompt-icon">&gt;</span>
                    <span><span class="highlight">Conventional Commits:</span> uma convenção simples de mensagens de commit que segue um conjunto de regras e ajuda os projetos a terem um <span class="highlight">histórico de commit explícito e bem estruturado</span>.</span>
                </div>
            </div>
            <figure class="merge-intro-illustration conventional-commits-hero" role="img" aria-label="Conventional Commits — especificação para mensagens de commit legíveis">
                <img src="conventional-commits.png" alt="Banner do site Conventional Commits: especificação para dar significado legível a mensagens de commit">
            </figure>
        </div>
    </div>
</body>
</html>
