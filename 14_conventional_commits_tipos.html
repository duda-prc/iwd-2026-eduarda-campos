<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container slide-conventional-tipos">
        <div class="header header--bp-anchor">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">1</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">Comunicação clara nos commits</span>
            </p>
            <h2>Conventional Commits: <span class="header-inline-code">&lt;tipo&gt;</span></h2>
        </div>
        <div class="content-body content-body--tipos-spec">
            <div class="tipo-spec-block">
                <div class="point tipo-spec-point">
                    <span class="prompt-icon">&gt;</span>
                    <span><span class="type-prefix">feat:</span> adiciona um novo recurso ao seu aplicativo ou biblioteca</span>
                </div>
                <div class="point tipo-spec-point">
                    <span class="prompt-icon">&gt;</span>
                    <span><span class="type-prefix">fix:</span> correção de um problema em seu aplicativo ou biblioteca</span>
                </div>
            </div>

            <div class="angular-convention-bridge" role="presentation">
                <span class="angular-convention-arrow" aria-hidden="true">→</span>
                <span class="angular-convention-label">Convenção Angular</span>
            </div>

            <p class="angular-convention-types">
                <span class="type-chip">refactor</span>
                <span class="type-chip-sep">/</span>
                <span class="type-chip">test</span>
                <span class="type-chip-sep">/</span>
                <span class="type-chip">docs</span>
                <span class="type-chip-sep">/</span>
                <span class="type-chip">chore</span>
                <span class="type-chip-sep">/</span>
                <span class="type-chip">style</span>
                <span class="type-chip-sep">/</span>
                <span class="type-chip">perf</span>
            </p>
        </div>
    </div>
</body>
</html>
