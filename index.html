<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do Caos ao Controle - Apresentação</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background-color: #1E1E1E;
            color: #E0E0E0;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
        }
        .container-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            align-items: center;
            box-sizing: border-box;
            padding: 28px 32px 0;
        }
        .presentation-container {
            width: 100%;
            flex: 1;
            max-width: 1280px;
            border: 2px solid #4ADE80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            display: flex;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .bottom-section {
            width: 100%;
            background-color: #1E1E1E;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            padding-bottom: 15px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1280px;
            padding: 15px 20px;
            background-color: #2D2D2D;
            border: 1px solid #333;
            box-sizing: border-box;
        }
        .control-button {
            background-color: #4ADE80;
            color: #1E1E1E;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            font-weight: bold;
        }
        .control-button:hover {
            background-color: #5FE099;
        }
        .control-button:disabled {
            background-color: #555;
            color: #999;
            cursor: not-allowed;
        }
        .slide-counter {
            font-size: 16px;
            color: #A5A5A5;
            font-family: 'Space Grotesk', sans-serif;
        }
        .keyboard-hint {
            margin-top: 8px;
            text-align: center;
            color: #A5A5A5;
            font-size: 13px;
        }
        .keyboard-hint span {
            color: #4ADE80;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="presentation-container">
            <iframe id="slideFrame" src="01_title_slide.html"></iframe>
        </div>

        <div class="bottom-section">
            <div class="controls">
                <button class="control-button" id="prevBtn" onclick="previousSlide()">← Anterior</button>
                <div class="slide-counter">
                    <span id="currentSlide">1</span> / <span id="totalSlides">33</span>
                </div>
                <button class="control-button" id="nextBtn" onclick="nextSlide()">Próximo →</button>
            </div>

            <div class="keyboard-hint">
                Use as setas <span>← →</span> do teclado ou clique nos botões para navegar
            </div>
        </div>
    </div>

    <script>
        const slides = [
            '01_title_slide.html',
            '02_about_me.html',
            '03_expectativa_duda_mundo_tech.html',
            '04_realidade_duda_mundo_tech.html',
            '05_intro_por_que_escrevemos_codigo.html',
            '05_por_que_escrevemos_codigo.html',
            '07_the_problem.html',
            '08_future_self.html',
            '09_git_tree_chaos.html',
            '10_commit_chaos.html',
            '11_boas_praticas_colaboracao_codigo.html',
            '12_conventional_commits_intro.html',
            '13_conventional_commits_tipos.html',
            '14_conventional_commits_exemplos.html',
            '15_why_conventional_commits.html',
            '16_comparison_examples.html',
            '17_gancho_commits_padrao_limpeza.html',
            '18_git_rebase_interativo.html',
            '19_git_commit_amend.html',
            '20_gancho_boas_praticas_mr_pr.html',
            '21_boas_praticas_mr_pr_intro.html',
            '22_pr_anatomy.html',
            '23_pr_context.html',
            '24_pr_exemplo_ruim.html',
            '25_pr_exemplo_bom.html',
            '26_gancho_merge_strategies.html',
            '27_merge_main_intro.html',
            '28_merge_squash.html',
            '29_merge_commit.html',
            '30_merge_rebase.html',
            '31_call_to_action.html',
            '32_final_phrase.html',
            '33_conclusion_qna.html'
        ];

        let currentSlideIndex = 0;

        function updateSlide() {
            const frame = document.getElementById('slideFrame');
            frame.src = slides[currentSlideIndex];
            document.getElementById('currentSlide').textContent = currentSlideIndex + 1;
            document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
            document.getElementById('nextBtn').disabled = currentSlideIndex === slides.length - 1;
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                updateSlide();
            }
        }

        function previousSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSlide();
            }
        }

        // Navegação por teclado
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                previousSlide();
            }
        });

        // Inicializar
        document.getElementById('totalSlides').textContent = slides.length;
        updateSlide();
    </script>
</body>
</html>
