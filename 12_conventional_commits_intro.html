<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2>Conventional Commits: O padrão ouro</h2>
        </div>
        <div class="content-body content-body--conventional-spec">
            <div class="structure-box structure-box--spec">
                <pre class="commit-spec" aria-label="Formato da mensagem Conventional Commits"><span class="commit-spec-k">&lt;tipo&gt;</span><span class="commit-spec-o">[escopo opcional]</span><span class="commit-spec-p">: </span><span class="commit-spec-k">&lt;descrição&gt;</span>

<span class="commit-spec-o">[corpo opcional]</span>

<span class="commit-spec-o">[rodapé(s) opcional(is)]</span></pre>
            </div>

            <p class="commit-spec-doc-link">
                <a href="https://www.conventionalcommits.org/en/v1.0.0/" target="_blank" rel="noopener noreferrer">https://www.conventionalcommits.org/en/v1.0.0/</a>
            </p>
        </div>
    </div>
</body>
</html>
