<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header header--bp-anchor">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">1</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">Comunicação clara nos commits</span>
            </p>
            <h2>Do padrão ao histórico limpo</h2>
        </div>
        <div class="content-grid content-grid--single content-grid--gancho-limpeza">
            <div class="text-section">
                <div class="point point--gancho-fechamento">
                    <span class="prompt-icon">&gt;</span>
                    <span><span class="highlight">Commits convencionais</span> definem <span class="highlight">o que</span> comunicar (tipo, escopo, descrição) — um vocabulário comum para quem lê o <code class="inline-git">git log</code>.</span>
                </div>
                <div class="point point--gancho-fechamento">
                    <span class="prompt-icon">&gt;</span>
                    <span>Manter commits <span class="highlight">limpos</span> é decidir <span class="highlight">como</span> essa história aparece antes do merge.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
