<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header header--bp-anchor slide-header--image-hero">
            <p class="good-practice-tracker" role="note">
                <span class="good-practice-tracker__label">Boas práticas</span>
                <span class="good-practice-tracker__badge" aria-hidden="true">2</span><span class="good-practice-tracker__of">/3</span>
                <span class="good-practice-tracker__sep">·</span>
                <span class="good-practice-tracker__item">PR com boa descrição e contexto</span>
            </p>
            <h2>Exemplo: PR com contexto</h2>
        </div>
        <div class="slide-image-hero">
            <div class="slide-image-placeholder">
                <img src="good-pr.png" alt="Captura de tela de um pull request bem descrito, com objetivo, contexto e passos para revisão">
            </div>
        </div>
    </div>
</body>
</html>
