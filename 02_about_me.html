<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slides.css">
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2>Quem sou eu</h2>
        </div>
        <div class="content-layout">
            <div class="photo-avatar">
                <img src="eduarda-campos.png" alt="Eduarda Campos">
            </div>
            <div class="info-section">
                <div class="name">Eduarda Campos</div>
                
                <div class="info-item">
                    <span class="prompt-icon">></span>
                    <div>
                        <span class="label">Formação:</span>
                        <span class="value">Engenharia ITA</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <span class="prompt-icon">></span>
                    <div>
                        <span class="label">Experiência:</span>
                        <span class="value">+3 anos de desenvolvimento backend, atuando em healthtechs</span>
                    </div>
                </div>

                <div class="info-item">
                    <span class="prompt-icon">></span>
                    <div>
                        <span class="label">Stack:</span>
                        <div class="tech-stack">
                            <span class="tech-badge">Python</span>
                            <span class="tech-badge">Django</span>
                            <span class="tech-badge">FastAPI</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
